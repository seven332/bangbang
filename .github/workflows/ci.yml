name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt --target aarch64-apple-darwin
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache guest artifacts
        uses: actions/cache@v6
        with:
          path: .tmp/guest-artifacts
          key: guest-artifacts-firecracker-v1.15-aarch64-vmlinux-6.1.155-e3544b10603acbf3db492cb52e000d22ba202cb4b63b9add027565683e11c591-rootfs-ubuntu-24.04-0efb6a3ff2982baa6ca7e3d940966516ba7ddd2df5deb3e6c2161d369a15d608

      - name: Fetch Firecracker guest kernel
        run: scripts/fetch-firecracker-kernel.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked --exclude bangbang-hvf

      - name: Run HVF unit tests
        run: cargo test -p bangbang-hvf --lib --all-features --locked

      - name: Run signed process e2e tests
        run: scripts/run-signed-process-tests.sh

      - name: Build and sign integration tests
        run: scripts/run-integration-tests.sh --allow-unsupported

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run clippy on signed integration targets
        run: |
          cargo clippy -p bangbang --test executable_hvf_e2e --all-features --locked --target aarch64-apple-darwin -- -D warnings
          cargo clippy -p bangbang-hvf --test hvf_lifecycle --all-features --locked --target aarch64-apple-darwin -- -D warnings
          cargo clippy -p bangbang-hvf --test guest_boot --all-features --locked --target aarch64-apple-darwin -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --locked
